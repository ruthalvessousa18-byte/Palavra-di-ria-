<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORAÇÃO DIÁRIA - MODO RETRÔ</title>
    <style>
        /* Estilo Geral Retrô */
        :root {
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
            --retro-border: 2px solid #39ff14;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-transform: uppercase;
        }

        /* Efeito de Scanline (linhas de TV antiga) */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            border: var(--retro-border);
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
            background-color: rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 3;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            border-bottom: var(--retro-border);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .date-display {
            font-size: 0.8rem;
            text-align: right;
            margin-bottom: 20px;
        }

        .section {
            margin-bottom: 25px;
        }

        .label {
            background-color: var(--neon-green);
            color: black;
            padding: 2px 5px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .content {
            line-height: 1.4;
            font-size: 1rem;
        }

        button {
            background-color: transparent;
            color: var(--neon-green);
            border: var(--retro-border);
            padding: 10px;
            width: 100%;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--neon-green);
            color: black;
        }

        /* Animação simples de piscar cursor */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 15px;
            background-color: var(--neon-green);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SISTEMA DE FÉ v1.0</h1>
    <div class="date-display" id="current-date">DATA: --/--/----</div>

    <div class="section">
        <span class="label">PALAVRA DE HOJE</span>
        <div class="content" id="bible-verse">
            "CARREGANDO..."
        </div>
    </div>

    <div class="section">
        <span class="label">ORAÇÃO DIÁRIA</span>
        <div class="content" id="prayer-text">
            AGUARDANDO COMANDO DO SERVIDOR...
        </div>
    </div>

    <button onclick="updateDaily()">ATUALIZAR SISTEMA</button>
    <p style="font-size: 0.6rem; text-align: center; margin-top: 20px;">
        CONEXÃO ESTABELECIDA COM O ALTO <span class="cursor"></span>
    </p>
</div>

<script>
    const conteudos = [
        {
            versiculo: "Salmos 23:1 - O Senhor é o meu pastor; de nada terei falta.",
            oracao: "Pai, hoje reconheço que Tu és meu guia. Não temerei o futuro, pois sei que Tu supres cada necessidade minha. Amém."
        },
        {
            versiculo: "Filipenses 4:13 - Tudo posso naquele que me fortalece.",
            oracao: "Senhor, renova minhas forças. Quando eu me sentir fraco, lembra-me que o Teu poder opera em mim. Capacita-me! Amém."
        },
        {
            versiculo: "Mateus 6:34 - Não se preocupem com o amanhã.",
            oracao: "Deus, entrego minha ansiedade a Ti. Ajuda-me a viver o dia de hoje com gratidão e confiança no Teu cuidado. Amém."
        }
    ];

    function updateDaily() {
        // Seleciona um conteúdo baseado no dia (simulação simples)
        const day = new Date().getDate() % conteudos.length;
        const item = conteudos[day];

        document.getElementById('bible-verse').innerText = item.versiculo;
        document.getElementById('prayer-text').innerText = item.oracao;
        
        const now = new Date();
        document.getElementById('current-date').innerText = `DATA: ${now.toLocaleDateString()}`;
    }

    // Iniciar ao carregar
    window.onload = updateDaily;
</script>

</body>
</html>
