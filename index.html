<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palavra Diária</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C8A2C8">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #C8A2C8 0%, #E6D7E6 100%);
      min-height: 100vh;
      padding: 20px 16px;
      color: #2d2d2d;
    }

  .header {
      text-align: center;
      margin-bottom: 24px;
      color: white;
    }

  .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

  .header.small {
      font-size: 14px;
      opacity: 0.9;
    }

  .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

  .card.small {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

  .vers {
      margin: 16px 0;
    }

  .txt {
      font-size: 20px;
      line-height: 1.6;
      color: #2d2d2d;
      font-weight: 500;
      margin-bottom: 12px;
    }

  .ref {
      font-size: 14px;
      color: #C8A2C8;
      font-weight: 600;
    }

  .actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

  .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

  .btn-primary {
      background: #C8A2C8;
      color: white;
    }

  .btn-primary:active {
      transform: scale(0.95);
    }

  .btn-secondary {
      background: #F5F5F5;
      color: #666;
    }

  .smallcards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }

  .smallcard {
      background: white;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

  .smallcard:active {
      transform: scale(0.96);
    }

  .smallcard.icon {
      font-size: 28px;
    }

  .smallcard h5 {
      font-size: 14px;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 2px;
    }

  .smallcard.small {
      font-size: 11px;
      color: #999;
      text-transform: none;
      letter-spacing: 0;
    }

  .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d2d2d;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
    }

  .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Palavra Diária</h1>
    <p class="small">Sua dose diária de fé</p>
  </div>

  <!-- Card Principal - Palavra do Dia -->
  <div class="card">
    <p class="small">Palavra do Dia</p>
    <div class="vers">
      <div class="txt" id="versiculoTexto">
        "O Senhor é o meu pastor; de nada terei falta."
      </div>
      <div class="ref" id="versiculoRef">Salmos 23:1</div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="compartilhar()">
        Compartilhar
      </button>
      <button class="btn btn-secondary" onclick="ouvir()">
        Ouvir
      </button>
    </div>
  </div>

  <!-- Botões Pequenos -->
  <div class="smallcards">
    <div class="smallcard" onclick="novaPalavra()">
      <div class="icon">📖</div>
      <div>
        <h5>Versículo Aleatório</h5>
        <p class="small" id="previewVerso">Toque para nova palavra</p>
      </div>
    </div>

    <div class="smallcard" onclick="mostrarToast('Em breve!')">
      <div class="icon">🙏</div>
      <div>
        <h5>Oração</h5>
        <p class="small">Fale com Deus</p>
      </div>
    </div>

    <div class="smallcard" onclick="mostrarToast('Em breve!')">
      <div class="icon">✨</div>
      <div>
        <h5>Devocional</h5>
        <p class="small">Reflexão do dia</p>
      </div>
    </div>

    <div class="smallcard" onclick="mostrarToast('Em breve!')">
      <div class="icon">⭐</div>
      <div>
        <h5>Favoritos</h5>
        <p class="small">Salvos</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Banco de Versículos em Português - NVI
    const devocionais = [
      { verso: "O Senhor é o meu pastor; de nada terei falta.", ref: "Salmos 23:1" },
      { verso: "Tudo posso naquele que me fortalece.", ref: "Filipenses 4:13" },
      { verso: "Aquietai-vos e sabei que eu sou Deus.", ref: "Salmos 46:10" },
      { verso: "Porque sou eu que conheço os planos que tenho para vocês, diz o Senhor.", ref: "Jeremias 29:11" },
      { verso: "Lancem sobre ele toda a sua ansiedade, porque ele tem cuidado de vocês.", ref: "1 Pedro 5:7" },
      { verso: "A alegria do Senhor é a nossa força.", ref: "Neemias 8:10" },
      { verso: "Confie no Senhor de todo o seu coração.", ref: "Provérbios 3:5" },
      { verso: "Não tema, pois eu estou com você.", ref: "Isaías 41:10" },
      { verso: "Façam tudo com amor.", ref: "1 Coríntios 16:14" },
      { verso: "Este é o dia que o Senhor fez; regozijemo-nos e alegremo-nos nele.", ref: "Salmos 118:24" },
      { verso: "Entregue o seu caminho ao Senhor; confie nele, e ele agirá.", ref: "Salmos 37:5" },
      { verso: "O choro pode durar uma noite, mas a alegria vem pela manhã.", ref: "Salmos 30:5" }
    ];

    let ultimoIndex = -1;
    let versoAtual = devocionais[0];

    // Gera nova palavra
    function novaPalavra() {
      let novoIndex;
      do {
        novoIndex = Math.floor(Math.random() * devocionais.length);
      } while (novoIndex === ultimoIndex && devocionais.length > 1);

      ultimoIndex = novoIndex;
      versoAtual = devocionais[novoIndex];

      document.getElementById("versiculoTexto").innerText = `"${versoAtual.verso}"`;
      document.getElementById("versiculoRef").innerText = versoAtual.ref;
      document.getElementById("previewVerso").innerText = versoAtual.ref;
    }

    // Compartilhar no WhatsApp
    function compartilhar() {
      const texto = `"${versoAtual.verso}" - ${versoAtual.ref}\n\nEnviado pelo app Palavra Diária 🙏`;
      const url = `https://wa.me/?text=${encodeURIComponent(texto)}`;
      window.open(url, '_blank');
    }

    // Ouvir com voz do celular em Português
    function ouvir() {
      if ('speechSynthesis' in window) {
        const msg = new SpeechSynthesisUtterance(`${versoAtual.verso}. ${versoAtual.ref}`);
        msg.lang = 'pt-BR';
        speechSynthesis.speak(msg);
      } else {
        mostrarToast('Seu navegador não suporta áudio');
      }
    }

    // Toast simples
    function mostrarToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Carrega ao abrir
    novaPalavra();

    // PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
